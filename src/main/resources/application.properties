# ConfiguraÁıes essenciais
spring.application.name=voucher-2
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/voucherdb
spring.datasource.username=root
spring.datasource.password=123456789
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Arquivos est·ticos (caso precise de imagens)
spring.web.resources.static-locations=file:./images/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Habilitar Open-in-View (necess·rio para Lazy Loading no JPA)
spring.jpa.open-in-view=true

# Desativar logging detalhado para seguranÁa e simplicidade no teste
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO

# JWT e AWS desativados (n„o necess·rios para CRUD b·sico)
